{% extends 'admin/master.html' %}

{% block body %}
<h1 class="mb-4">Tools</h1>

<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">Car seeding</div>
            <div class="card-body">
                <p class="card-text">
                    Populate the <code>cars</code> table with sample data
                    ({{ sample_count }} cars).
                </p>
                <p class="text-muted mb-4">
                    Current table size: <strong>{{ cars_count }}</strong> record(s).
                </p>

                <form method="post" action="{{ url_for('.seed') }}" class="d-inline">
                    <button type="submit" class="btn btn-primary mr-2">
                        Seed with samples
                    </button>
                </form>

                <form method="post" action="{{ url_for('.seed') }}" class="d-inline"
                      onsubmit="return confirm('Clear the table and add sample cars?');">
                    <input type="hidden" name="clear" value="1">
                    <button type="submit" class="btn btn-warning">
                        Clear and seed
                    </button>
                </form>

                <form method="post" action="{{ url_for('.clear') }}" class="d-inline mt-2"
                      onsubmit="return confirm('Clear all cars from the table?');">
                    <button type="submit" class="btn btn-danger">
                        Clear cars
                    </button>
                </form>
            </div>
            <div class="card-footer text-muted small">
                Equivalent to the CLI commands <code>flask cars-seed</code>,
                <code>flask cars-seed --clear</code>, and <code>flask cars-clear</code>.
            </div>
        </div>
    </div>
</div>
{% endblock %}
