{% extends 'admin/master.html' %}

{% block body %}
<h1 class="mb-4">Инструменты</h1>

<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">Seeding автомобилей</div>
            <div class="card-body">
                <p class="card-text">
                    Заполнить таблицу <code>cars</code> тестовыми данными
                    ({{ sample_count }} автомобилей).
                </p>
                <p class="text-muted mb-4">
                    Сейчас в таблице: <strong>{{ cars_count }}</strong> запис(ей).
                </p>

                <form method="post" action="{{ url_for('.seed') }}" class="d-inline">
                    <button type="submit" class="btn btn-primary mr-2">
                        Заполнить примерами
                    </button>
                </form>

                <form method="post" action="{{ url_for('.seed') }}" class="d-inline"
                      onsubmit="return confirm('Очистить таблицу и добавить примеры автомобилей?');">
                    <input type="hidden" name="clear" value="1">
                    <button type="submit" class="btn btn-warning">
                        Очистить и заполнить
                    </button>
                </form>
            </div>
            <div class="card-footer text-muted small">
                Аналог консольных команд <code>flask seed-cars</code> и
                <code>flask seed-cars --clear</code>.
            </div>
        </div>
    </div>
</div>
{% endblock %}
